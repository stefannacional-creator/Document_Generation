name: Deploy Backend to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Supabase client
        run: pip install supabase psycopg2-binary

      - name: Provision Supabase bucket and table
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'EOF'
          import os
          import psycopg2
          from supabase import create_client

          bucket = os.environ["SUPABASE_STORAGE_BUCKET"]
          client = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])

          # Create bucket (private) — skip if already exists
          try:
              client.storage.create_bucket(bucket, options={"public": False})
              print(f"Bucket '{bucket}' created.")
          except Exception as e:
              print(f"Bucket already exists or skipped: {e}")

          # Create table + index — idempotent
          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          conn.autocommit = True
          with conn.cursor() as cur:
              cur.execute("""
                  CREATE TABLE IF NOT EXISTS documents (
                      id              uuid primary key default gen_random_uuid(),
                      user_id         uuid,
                      title           text not null,
                      document_type   text not null,
                      topic           text not null,
                      style           text not null default 'professional',
                      file_name       text not null unique,
                      storage_url     text not null,
                      file_size       integer not null,
                      created_at      timestamptz not null default now()
                  );
                  CREATE INDEX IF NOT EXISTS documents_user_id_idx ON documents(user_id);
              """)
          conn.close()
          print("Table provisioned.")
          EOF

      - name: Trigger Render Deploy
        run: |
          curl -fsSL -X POST "${RENDER_DEPLOY_HOOK_URL}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
